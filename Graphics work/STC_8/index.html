<!--Shake to Clear: When moving the mouse quickly side to side,
 all page elements fall down or disappear.-->
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shake to Clear</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
  <button class="falling-btn">Button 1</button>
  <button class="falling-btn">Button 2</button>
  <button class="falling-btn">Button 3</button>
  <button class="falling-btn">Button 4</button>
</div>

<script src="script.js"></script>
</body>
</html>
