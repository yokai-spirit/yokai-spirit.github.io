<!--Screen Edge Warp: When dragging an object off the edge of the screen,
 it appears on the opposite side (Pac-Man effect).-->
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Edge Warp with Portals</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="draggable"></div>
<div id="portalBlue" class="portal"></div>
<div id="portalOrange" class="portal"></div>

<script src="script.js"></script>
</body>
</html>
