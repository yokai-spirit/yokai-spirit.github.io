<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emotion Background Camera App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body class="emotion-neutral">
    <div class="ambient-layer"></div>
    <main class="app-shell">
      <header class="app-header">
        <h1>Live Emotion Scene</h1>
        <p>Show your face to the camera. The full background reacts to your emotion.</p>
      </header>

      <section class="camera-card" aria-live="polite">
        <div class="video-wrap">
          <video id="webcam" autoplay muted playsinline></video>
          <div id="stickerLayer" class="sticker-layer" aria-hidden="true"></div>
          <canvas id="pingPongCanvas" class="ping-pong-canvas" aria-hidden="true"></canvas>
          <div class="corner-vignette" aria-hidden="true"></div>
          <div id="liveBadge" class="live-badge" aria-hidden="true">
            <span class="dot"></span>
            LIVE
          </div>
          <div class="scanline"></div>
        </div>

        <div class="status-grid">
          <article class="status-item">
            <h2>Detected Emotion</h2>
            <p id="emotionLabel">Loading models...</p>
          </article>
          <article class="status-item">
            <h2>Confidence</h2>
            <p id="confidenceLabel">-</p>
          </article>
        </div>

        <div class="sticker-controls" aria-label="Sticker controls">
          <button id="smackModeButton" type="button" class="panel-button smack-mode-button">
            Smack Sticker Mode: Off
          </button>
          <button id="glitchFilterButton" type="button" class="panel-button glitch-filter-button">
            Glitch Filter: Off
          </button>
          <button id="liveFilterButton" type="button" class="panel-button live-filter-button">
            Live Filter: Off
          </button>
          <button id="pingPongFilterButton" type="button" class="panel-button ping-pong-filter-button">
            Ping Pong Game: Off
          </button>
        </div>
      </section>

      <section class="legend" aria-label="Emotion color legend">
        <h2>Background Mapping</h2>
        <ul>
          <li><span class="dot happy"></span>Happiness → Yellow</li>
          <li><span class="dot sad"></span>Sadness → Ocean blue + cyan</li>
          <li><span class="dot neutral"></span>Neutral → Light gray</li>
          <li><span class="dot angry"></span>Anger → Green mixed with red</li>
        </ul>
      </section>
    </main>
  </body>
</html>
