<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canvas Apocalypse</title>
<style>
    body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        color: white;
    }
    canvas {
        background: #000;
        display: block;
    }
</style>
</head>
<body>
<button id="fullscreenBtn" style="position:absolute;top:24px;right:24px;z-index:10;padding:10px 18px;font-size:16px;cursor:pointer;">Full Resolution</button>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<script>
// Fullscreen Button Handler
document.getElementById('fullscreenBtn').addEventListener('click', function() {
    const canvas = document.getElementById('gameCanvas');
    if (canvas.requestFullscreen) {
        canvas.requestFullscreen();
    } else if (canvas.webkitRequestFullscreen) { // Safari
        canvas.webkitRequestFullscreen();
    } else if (canvas.msRequestFullscreen) { // IE11
        canvas.msRequestFullscreen();
    }
});
// =====================
// Constants
// =====================
const CANVAS_WIDTH = 800;
const CANVAS_HEIGHT = 600;
const PLAYER_SIZE = 40; // increased size
const PLAYER_COLOR = 'lime';
// explosion image for game over
const explosionImg = new Image();
explosionImg.src = 'explosion.png';
// =====================
// Player Image
// =====================
const playerImg = new Image();
playerImg.src = 'wheatly.png';

// =====================
// Canvas Setup
// =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// =====================
// Game States
// =====================
const STATE_MENU = 'MENU';
const STATE_PLAY = 'PLAY';
const STATE_GAMEOVER = 'GAMEOVER';

let gameState = STATE_MENU;

// =====================
// Difficulty Settings
// =====================
const DIFFICULTIES = {
    1: { name: 'Easy', enemySpeed: 50, spawnInterval: 3, scalingRate: 0.5 },
    2: { name: 'Medium', enemySpeed: 80, spawnInterval: 2, scalingRate: 1 },
    3: { name: 'Hard', enemySpeed: 120, spawnInterval: 1.5, scalingRate: 1.5 }
};
let difficulty = DIFFICULTIES[1];

// =====================
// Game Variables
// =====================
let lastTime = 0;
let keysPressed = {};
let state = {
    player: { x: CANVAS_WIDTH/2-PLAYER_SIZE/2, y: CANVAS_HEIGHT/2-PLAYER_SIZE/2, width: PLAYER_SIZE, height: PLAYER_SIZE, speed: 200, angle: 0 },
    enemies: [],
    // explosion info for game over
    explosion: { x: 0, y: 0, active: false },
    spawnTimer: 0,
    timeSurvived: 0,
    score: 0,
    screenShake: 0
};
let highscore = parseFloat(localStorage.getItem('canvas_apocalypse_highscore')) || 0;

// =====================
// Input Handling
// =====================
window.addEventListener('keydown', e => {
    keysPressed[e.key.toLowerCase()] = true;
    if(gameState === STATE_MENU) {
        if(['1','2','3'].includes(e.key)){
            difficulty = DIFFICULTIES[e.key];
            resetGame();
            gameState = STATE_PLAY;
        }
    }
    if(gameState === STATE_GAMEOVER && e.key.toLowerCase() === 'r'){
        resetGame();
        gameState = STATE_PLAY;
    }
});
window.addEventListener('keyup', e => keysPressed[e.key.toLowerCase()] = false);

// =====================
// Utility Functions
// =====================
function clamp(val, min, max){ return Math.max(min, Math.min(max, val)); }
function randRange(min,max){ return Math.random()*(max-min)+min; }
function normalizeVector(x,y){
    let mag = Math.hypot(x,y);
    return mag===0 ? {x:0,y:0} : {x:x/mag, y:y/mag};
}

// =====================
// Game Functions
// =====================
function update(deltaTime){
    if(gameState !== STATE_PLAY) return;

    // --- Player Movement ---
    let moveX = 0, moveY = 0;
    // rotate player continuously: full cycle every 1.6s
    state.player.angle += (2 * Math.PI / 1.6) * deltaTime;
    if(keysPressed['w'] || keysPressed['arrowup']) moveY -= 1;
    if(keysPressed['s'] || keysPressed['arrowdown']) moveY += 1;
    if(keysPressed['a'] || keysPressed['arrowleft']) moveX -=1;
    if(keysPressed['d'] || keysPressed['arrowright']) moveX +=1;

    let dir = normalizeVector(moveX, moveY);
    state.player.x += dir.x * state.player.speed * deltaTime;
    state.player.y += dir.y * state.player.speed * deltaTime;

    // Clamp player to canvas
    state.player.x = clamp(state.player.x,0,CANVAS_WIDTH-PLAYER_SIZE);
    state.player.y = clamp(state.player.y,0,CANVAS_HEIGHT-PLAYER_SIZE);

    // --- Spawn Enemies ---
    state.spawnTimer += deltaTime;
    if(state.spawnTimer >= difficulty.spawnInterval){
        spawnEnemy();
        state.spawnTimer = 0;
    }

    // --- Update Enemies ---
    state.enemies.forEach(enemy => {
        let dx = state.player.x + PLAYER_SIZE/2 - enemy.x;
        let dy = state.player.y + PLAYER_SIZE/2 - enemy.y;
        let dir = normalizeVector(dx, dy);
        enemy.x += dir.x * enemy.speed * deltaTime;
        enemy.y += dir.y * enemy.speed * deltaTime;
        // rotate enemy: one full cycle every 1.6 seconds
        enemy.angle += (2 * Math.PI / 1.6) * deltaTime;
    });

    // --- Collision Detection ---
    state.enemies.forEach(enemy => {
        if(circleRectCollision(enemy.x, enemy.y, enemy.radius, state.player)){
            gameOver();
        }
    });

    // --- Update Particles ---
    updateParticles(deltaTime);

    // --- Update Time & Score ---
    state.timeSurvived += deltaTime;
    state.score = Math.floor(state.timeSurvived);

    // --- Increase Difficulty Gradually ---
    difficulty.enemySpeed += difficulty.scalingRate * deltaTime;
};

function draw(){
    // --- Screen Shake ---
    let shakeX=0, shakeY=0;
    if(state.screenShake>0){
        shakeX = randRange(-state.screenShake,state.screenShake);
        shakeY = randRange(-state.screenShake,state.screenShake);
        state.screenShake -= 600*deltaTime; // decay shake
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    // --- Clear Canvas ---
    ctx.clearRect(0,0,CANVAS_WIDTH,CANVAS_HEIGHT);

    // --- Draw Background (moving dots) ---
    drawBackground();

    if(gameState === STATE_MENU){
        ctx.fillStyle='white';
        ctx.font='30px sans-serif';
        ctx.textAlign='center';
        ctx.fillText('Canvas Apocalypse', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 60);
        ctx.fillText('1: Easy   2: Medium   3: Hard', CANVAS_WIDTH/2, CANVAS_HEIGHT/2);
        ctx.fillText('Highscore: '+highscore, CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 60);
    }

    if(gameState === STATE_PLAY || gameState === STATE_GAMEOVER){
        // --- Draw Player ---
        if (playerImg.complete && playerImg.naturalWidth !== 0) {
            ctx.save();
            ctx.translate(state.player.x + PLAYER_SIZE/2, state.player.y + PLAYER_SIZE/2);
            ctx.rotate(state.player.angle);
            ctx.drawImage(playerImg, -PLAYER_SIZE/2, -PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);
            ctx.restore();
        } else {
            ctx.fillStyle = PLAYER_COLOR;
            ctx.fillRect(state.player.x, state.player.y, PLAYER_SIZE, PLAYER_SIZE);
        }

        // --- Draw Enemies as Turrets ---
        if (!window.turretImg) {
            window.turretImg = new Image();
            window.turretImg.src = 'turret.png';
        }
        state.enemies.forEach(enemy => {
            // rotate and draw the turret image
            ctx.save();
            ctx.translate(enemy.x, enemy.y);
            ctx.rotate(enemy.angle);
            ctx.drawImage(
                window.turretImg,
                -enemy.radius,
                -enemy.radius,
                enemy.radius * 2,
                enemy.radius * 2
            );
            ctx.restore();
        });

        // (particles removed)

        // --- Draw UI ---
        ctx.fillStyle='white';
        ctx.font='20px sans-serif';
        ctx.textAlign='left';
        ctx.fillText('Time: '+Math.floor(state.timeSurvived), 10, 30);
        ctx.fillText('Score: '+state.score, 10, 55);
        ctx.fillText('Highscore: '+highscore, 10, 80);
    }

    if(gameState === STATE_GAMEOVER){
        // draw explosion if available
        if(state.explosion.active && explosionImg.complete){
            let size = 200;
            ctx.drawImage(explosionImg, state.explosion.x - size/2, state.explosion.y - size/2, size, size);
        }
        ctx.fillStyle='white';
        ctx.font='40px sans-serif';
        ctx.textAlign='center';
        ctx.fillText('GAME OVER', CANVAS_WIDTH/2, CANVAS_HEIGHT/2);
        ctx.font='20px sans-serif';
        ctx.fillText('Press R to restart', CANVAS_WIDTH/2, CANVAS_HEIGHT/2+40);
    }

    ctx.restore();
}

// =====================
// Spawn Enemy
// =====================
function spawnEnemy(){
    let edge = Math.floor(randRange(0,4));
    let x, y;
    if(edge===0){ x=randRange(0,CANVAS_WIDTH); y=-20; }          // top
    else if(edge===1){ x=randRange(0,CANVAS_WIDTH); y=CANVAS_HEIGHT+20;} // bottom
    else if(edge===2){ x=-20; y=randRange(0,CANVAS_HEIGHT);}     // left
    else { x=CANVAS_WIDTH+20; y=randRange(0,CANVAS_HEIGHT);}     // right

    // Make enemies bigger (radius 24 instead of 10) and track rotation
    state.enemies.push({x,y,radius:24,speed:difficulty.enemySpeed, angle: 0});
}

// =====================
// Collision Detection
// =====================
function circleRectCollision(cx,cy,r,rect){
    // approximate player as rectangle
    let closestX = clamp(cx, rect.x, rect.x+rect.width);
    let closestY = clamp(cy, rect.y, rect.y+rect.height);
    let dx = cx-closestX;
    let dy = cy-closestY;
    return (dx*dx + dy*dy) < r*r;
}

// =====================
// Game Over
// =====================
function gameOver(){
    gameState = STATE_GAMEOVER;
    state.screenShake = 5;
    state.explosion.x = state.player.x + PLAYER_SIZE/2;
    state.explosion.y = state.player.y + PLAYER_SIZE/2;
    state.explosion.active = true;
    if(state.score>highscore){
        highscore = state.score;
        localStorage.setItem('canvas_apocalypse_highscore', highscore);
    }
}

// =====================
// Reset Game
// =====================
function resetGame(){
    state.player.x = CANVAS_WIDTH/2-PLAYER_SIZE/2;
    state.player.y = CANVAS_HEIGHT/2-PLAYER_SIZE/2;
    state.player.width = PLAYER_SIZE;
    state.player.height = PLAYER_SIZE;
    state.enemies = [];
    state.particles = [];
    state.spawnTimer=0;
    state.timeSurvived=0;
    state.score=0;
    difficulty.enemySpeed = DIFFICULTIES[Object.keys(DIFFICULTIES).find(k=>DIFFICULTIES[k]===difficulty)].enemySpeed;
}

// =====================
// Particles
// =====================
function spawnExplosion(x,y){
    for(let i=0;i<PARTICLE_COUNT;i++){
        state.particles.push({
            x,y,
            vx: randRange(-150,150),
            vy: randRange(-150,150),
            life: randRange(0.5,1),
            color: 'orange'
        });
    }
}

function updateParticles(dt){
    for(let i=state.particles.length-1;i>=0;i--){
        let p=state.particles[i];
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        p.life -= dt;
        if(p.life<=0) state.particles.splice(i,1);
    }
}

function drawParticles(){
    state.particles.forEach(p=>{
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x,p.y,3,3);
    });
    ctx.globalAlpha = 1;
}

// =====================
// Background Effect
// =====================
let bgDots = Array.from({length:50},()=>({x:randRange(0,CANVAS_WIDTH),y:randRange(0,CANVAS_HEIGHT),vx:randRange(-20,20),vy:randRange(-20,20)}));
function drawBackground(){
    ctx.fillStyle='white';
    bgDots.forEach(dot=>{
        dot.x += dot.vx*deltaTime;
        dot.y += dot.vy*deltaTime;
        if(dot.x<0) dot.x=CANVAS_WIDTH;
        if(dot.x>CANVAS_WIDTH) dot.x=0;
        if(dot.y<0) dot.y=CANVAS_HEIGHT;
        if(dot.y>CANVAS_HEIGHT) dot.y=0;
        ctx.fillRect(dot.x,dot.y,2,2);
    });
}

// =====================
// Game Loop
// =====================
let deltaTime=0;
function loop(timestamp){
    if(!lastTime) lastTime = timestamp;
    deltaTime = (timestamp - lastTime)/1000; // seconds
    lastTime = timestamp;

    update(deltaTime);
    draw();

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

</script>
</body>
</html>
